</head>
<body>

  <!-- ══════════════════════════════════════════
       ZONE 1 — VIEWMODEL
  ══════════════════════════════════════════ -->
  <rect x="0" y="0" width="760" height="178" rx="12" fill="#F5F3FF" stroke="#DDD6FE" stroke-width="1.5"/>
  <rect x="8" y="8" width="164" height="20" rx="10" fill="#4C1D95"/>

  <text x="103" y="134" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="8" fill="#C2410C">.observeInputScreenUserSettingEnabled()</text>

  <line x1="213" y1="48" x2="213" y2="161" stroke="#94A3B8" stroke-width="1.5"/>
  <line x1="213" y1="104" x2="226" y2="104" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <text x="348" y="59" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="9" fill="#7E22CE">@ContributesViewModel(ViewScope::class)</text>
  <line x1="248" y1="63" x2="448" y2="63" stroke="#E9D5FF" stroke-width="1"/>
  <text x="348" y="76" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="9" fill="#7E22CE">combine(showSettings, userEnabled,</text>
  <text x="348" y="88" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="9" fill="#7E22CE">  inputScreenEnabled, widgetConfig)</text>
  <text x="348" y="102" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="9" fill="#7E22CE">  → NativeInputState</text>
  <text x="348" y="115" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="9" fill="#A855F7">shareIn(Eagerly, replay = 1)</text>
  <line x1="248" y1="120" x2="448" y2="120" stroke="#E9D5FF" stroke-width="1"/>
  <text x="348" y="133" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="9" fill="#7E22CE">chatState ← DuckChatInternal.chatState</text>
  <text x="348" y="146" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="9" fill="#7E22CE">isPaidTier ← Subscriptions.getEntitlementStatus()</text>
  <text x="348" y="158" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="9" fill="#7E22CE">chatSuggestionsUserEnabled ← DuckChatInternal</text>

  <!-- Bus from ViewModel → outputs -->
  <line x1="468" y1="104" x2="480" y2="104" stroke="#94A3B8" stroke-width="1.5"/>
  <line x1="480" y1="48" x2="480" y2="161" stroke="#94A3B8" stroke-width="1.5"/>
  <line x1="480" y1="48" x2="492" y2="48" stroke="#34D399" stroke-width="1.5" marker-end="url(#arrowG)"/>
  <line x1="480" y1="86" x2="492" y2="86" stroke="#60A5FA" stroke-width="1.5" marker-end="url(#arrowB)"/>

  <line x1="480" y1="157" x2="492" y2="157" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ① state: SharedFlow<NativeInputState> -->
  <rect x="494" y="34" width="260" height="26" rx="7" fill="#DCFCE7" stroke="#6EE7B7" stroke-width="2"/>
  <text x="624" y="47" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="9" font-weight="700" fill="#065F46">① state: SharedFlow&lt;NativeInputState&gt;</text>
  <text x="624" y="57" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="8" fill="#15803D">observeNativeInputState() in widget</text>

  <!-- ② chatState: Flow<ChatState> -->
  <rect x="494" y="72" width="260" height="26" rx="7" fill="#EFF6FF" stroke="#93C5FD" stroke-width="2"/>
  <text x="624" y="85" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="9" font-weight="700" fill="#1D4ED8">② chatState: Flow&lt;ChatState&gt;</text>
  <text x="624" y="95" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="8" fill="#3B82F6">observeChatState() — drop(1), skips initial</text>

  <!-- ③ isPaidTier: Flow<Boolean> -->
  <rect x="494" y="110" width="260" height="26" rx="7" fill="#FFF7ED" stroke="#FDBA74" stroke-width="2"/>
  <text x="624" y="123" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="9" font-weight="700" fill="#C2410C">③ isPaidTier: Flow&lt;Boolean&gt;</text>
  <text x="624" y="133" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="8" fill="#EA580C">observeTier() — only when onPaidTierChanged set</text>

  <!-- ④ chatSuggestionsUserEnabled -->
  <rect x="494" y="146" width="260" height="26" rx="7" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1.5"/>
  <text x="624" y="159" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="9" font-weight="600" fill="#475569">④ chatSuggestionsUserEnabled: Flow&lt;Boolean&gt;</text>
  <text x="624" y="169" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="8" fill="#64748B">observeChatSuggestionsEnabled()</text>

       ZONE 2 — NATIVEINPUTSTATE
  ══════════════════════════════════════════ -->

  <rect x="8" y="196" width="132" height="20" rx="10" fill="#065F46"/>
  <text x="74" y="210" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="11" font-weight="700" fill="white">NATIVEINPUTSTATE</text>

  <text x="190" y="248" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="10" fill="#047857">inputMode</text>

  <text x="380" y="260" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="9" fill="#065F46">BROWSER | DUCK_AI</text>
  <line x1="470" y1="233" x2="470" y2="266" stroke="#A7F3D0" stroke-width="1"/>
  <text x="560" y="248" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="10" fill="#047857">inputPosition</text>
  <text x="560" y="260" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="9" fill="#065F46">TOP | BOTTOM</text>
  <line x1="630" y1="233" x2="630" y2="266" stroke="#A7F3D0" stroke-width="1"/>
  <text x="680" y="248" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="9" font-style="italic" fill="#059669">derived:</text>
  <text x="680" y="260" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="9" fill="#065F46">toggleVisible · isBottom · defaultToggleSelection</text>

  <!-- ══════════════════════════════════════════
       ZONE 3 — WIDGET REACTIONS
  ══════════════════════════════════════════ -->
  <rect x="0" y="292" width="760" height="300" rx="12" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1.5"/>
  <rect x="8" y="300" width="138" height="20" rx="10" fill="#1E40AF"/>
  <text x="77" y="314" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="11" font-weight="700" fill="white">WIDGET REACTIONS</text>

  <line x1="253" y1="296" x2="253" y2="590" stroke="#BFDBFE" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="507" y1="296" x2="507" y2="590" stroke="#BFDBFE" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- ─── Col 1: observeNativeInputState ─── -->
  <!-- Header -->
  <rect x="5" y="322" width="243" height="24" rx="7" fill="#DCFCE7" stroke="#6EE7B7" stroke-width="1.5"/>
  <text x="127" y="338" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="10" font-weight="700" fill="#065F46">① applyState(NativeInputState)</text>

  <!-- Effect: toggleVisible=true -->
  <rect x="5" y="356" width="243" height="32" rx="7" fill="#F0FDF4" stroke="#BBF7D0" stroke-width="1.5"/>
  <text x="127" y="369" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="10" font-weight="600" fill="#166534">toggleVisible = true</text>
  <text x="127" y="381" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="9" fill="#15803D">TabLayout.VISIBLE — toggle shown</text>

  <!-- Effect: toggleVisible=false -->
  <rect x="5" y="398" width="243" height="44" rx="7" fill="#F0FDF4" stroke="#BBF7D0" stroke-width="1.5"/>
  <text x="127" y="411" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="10" font-weight="600" fill="#166534">toggleVisible = false</text>
  <text x="127" y="423" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="9" fill="#15803D">TabLayout.GONE + minimize()</text>
  <text x="127" y="435" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="9" fill="#15803D">shrinks spacers · omnibar shape</text>

  <!-- Effect: tab selection -->
  <rect x="5" y="452" width="243" height="32" rx="7" fill="#F0FDF4" stroke="#BBF7D0" stroke-width="1.5"/>
  <text x="127" y="465" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="10" font-weight="600" fill="#166534">defaultToggleSelection</text>
  <text x="127" y="477" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="9" fill="#15803D">select tab 0 (Search) or 1 (Duck AI)</text>

  <!-- Effect: cache -->
  <rect x="5" y="494" width="243" height="26" rx="7" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1.5"/>
  <text x="127" y="511" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="9" fill="#64748B">cached in nativeInputState field</text>

  <!-- ─── Col 2: observeChatState ─── -->
  <!-- Header -->
  <rect x="259" y="322" width="243" height="24" rx="7" fill="#EFF6FF" stroke="#93C5FD" stroke-width="1.5"/>
  <text x="381" y="338" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="10" font-weight="700" fill="#1D4ED8">② observeChatState()  drop(1)</text>

  <!-- ChatState: HIDE -->
  <rect x="259" y="356" width="243" height="44" rx="7" fill="#FEF2F2" stroke="#FCA5A5" stroke-width="1.5"/>
  <text x="381" y="369" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="10" font-weight="700" fill="#991B1B">ChatState.HIDE</text>
  <text x="381" y="381" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="9" fill="#B91C1C">dismiss keyboard · clear focus</text>
  <text x="381" y="393" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="9" fill="#B91C1C">widgetRoot?.visibility = GONE</text>

  <!-- ChatState: SHOW -->
  <rect x="259" y="410" width="243" height="32" rx="7" fill="#F0FDF4" stroke="#BBF7D0" stroke-width="1.5"/>
  <text x="381" y="423" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="10" font-weight="700" fill="#166534">ChatState.SHOW / READY</text>
  <text x="381" y="435" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="9" fill="#15803D">widgetRoot?.visibility = VISIBLE</text>

  <!-- ChatState: STREAMING/LOADING -->
  <rect x="259" y="452" width="243" height="44" rx="7" fill="#FFFBEB" stroke="#FDE68A" stroke-width="1.5"/>
  <text x="381" y="465" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="10" font-weight="700" fill="#92400E">STREAMING / LOADING</text>
  <text x="381" y="477" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="9" fill="#B45309">showStopButton · disable send</text>
  <text x="381" y="489" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="9" fill="#B45309">isStreaming = true</text>

  <!-- ChatState: back to idle -->
  <rect x="259" y="506" width="243" height="26" rx="7" fill="#F0FDF4" stroke="#BBF7D0" stroke-width="1.5"/>
  <text x="381" y="523" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="9" fill="#166534">idle → showSendButton · re-enable if text non-blank</text>

  <!-- ─── Col 3: isPaidTier + suggestions ─── -->
  <!-- Header -->
  <rect x="513" y="322" width="243" height="24" rx="7" fill="#FFF7ED" stroke="#FDBA74" stroke-width="1.5"/>
  <text x="635" y="334" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="9" font-weight="700" fill="#C2410C">③④ observeTier() + observeSuggestions()</text>

  <!-- isPaidTier -->
  <rect x="513" y="356" width="243" height="44" rx="7" fill="#FFF7ED" stroke="#FED7AA" stroke-width="1.5"/>
  <text x="635" y="369" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="10" font-weight="600" fill="#9A3412">③ isPaidTier: Flow&lt;Boolean&gt;</text>
  <text x="635" y="381" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="9" fill="#C2410C">forwards via onPaidTierChanged callback</text>
  <text x="635" y="393" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="9" fill="#C2410C">→ BrowserFragment (e.g. show Plus badge)</text>

  <!-- chatSuggestionsEnabled -->
  <rect x="513" y="410" width="243" height="44" rx="7" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1.5"/>
  <text x="635" y="423" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="10" font-weight="600" fill="#475569">④ chatSuggestionsUserEnabled</text>
  <text x="635" y="435" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="9" fill="#64748B">cached as local Boolean</text>
  <text x="635" y="447" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="9" fill="#64748B">gates fetchChatSuggestions() call</text>

  <!-- External setters box (bottom of col 3) -->
  <rect x="513" y="464" width="243" height="68" rx="7" fill="#EEF2FF" stroke="#C7D2FE" stroke-width="1.5"/>
  <text x="635" y="479" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="10" font-weight="700" fill="#3730A3">External state setters</text>
  <text x="635" y="492" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="9" fill="#4338CA">configure(isDuckAiMode, isBottom)</text>
  <text x="635" y="503" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="9" fill="#4338CA">→ viewModel.configure() → widgetConfig ↑</text>
  <text x="635" y="516" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="9" fill="#4338CA">setVoiceSearchAvailable()</text>
  <text x="635" y="527" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="9" fill="#6366F1">setVoiceChatAvailable()</text>
  <text x="635" y="539" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="9" fill="#818CF8">→ local flags only · no ViewModel</text>

  <!-- Connector dots / flow tags at zone border -->
  <!-- ① green dot on Zone 2/3 border at col 1 centre -->
  <circle cx="127" cy="291" r="5" fill="#6EE7B7" stroke="#059669" stroke-width="1.5"/>
  <line x1="127" y1="284" x2="127" y2="292" stroke="#6EE7B7" stroke-width="1.5"/>
  <!-- ② blue dot at col 2 -->
  <circle cx="381" cy="291" r="5" fill="#93C5FD" stroke="#2563EB" stroke-width="1.5"/>
  <line x1="381" y1="284" x2="381" y2="292" stroke="#93C5FD" stroke-width="1.5"/>
  <!-- ③ orange dot at col 3 -->
  <circle cx="635" cy="291" r="5" fill="#FDBA74" stroke="#D97706" stroke-width="1.5"/>
  <line x1="635" y1="284" x2="635" y2="292" stroke="#FDBA74" stroke-width="1.5"/>

  <!-- Zone 1 → Zone 2 connector from SharedFlow output -->
  <line x1="624" y1="60" x2="624" y2="185" stroke="#6EE7B7" stroke-width="1.5" stroke-dasharray="4,2"/>
  <line x1="624" y1="185" x2="380" y2="185" stroke="#6EE7B7" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrowG)"/>

  <!-- ══ Footer ══ -->
  <text x="380" y="608" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="9" fill="#94A3B8">All flows collected in lifecycleScope of the widget's LifecycleOwner · Jobs cancelled onDetachedFromWindow · ViewModel scoped to ViewScope (recreated with view)</text>
  <text x="380" y="622" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="9" fill="#94A3B8">User text input and tab selection drive additional local button visibility logic (updateSendButtonVisibility, updateVoiceButtonVisibility) independently of ViewModel</text>
