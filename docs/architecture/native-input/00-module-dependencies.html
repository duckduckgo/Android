<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NativeInputWidget Module Dependencies</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', sans-serif;
    background: #F5F5F7;
    padding: 40px;
  }
</style>
</head>
<body>
<svg width="740" height="576" xmlns="http://www.w3.org/2000/svg">
  <defs>

      <path d="M0,0.5 L7,3.5 L0,6.5 Z" fill="#F87171"/>

    <marker id="arrowG" markerWidth="8" markerHeight="8" refX="7" refY="3.5" orient="auto">
      <path d="M0,0.5 L7,3.5 L0,6.5 Z" fill="#34D399"/>
    </marker>
  </defs>

  <!-- ══════════════════════════════════════

  ══════════════════════════════════════ -->
  <rect x="0" y="0" width="740" height="258" rx="12" fill="#FEF2F2" stroke="#FECACA" stroke-width="1.5"/>
  <rect x="8" y="8" width="72" height="20" rx="10" fill="#991B1B"/>

  <!-- :app -->
  <rect x="300" y="30" width="140" height="26" rx="8" fill="#EEF2FF" stroke="#C7D2FE" stroke-width="1.5"/>
  <text x="370" y="47" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="12" font-weight="600" fill="#3730A3">:app</text>

  <!-- :app → :duckchat-impl (left diagonal) -->
  <line x1="340" y1="56" x2="208" y2="82" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- :app → :duckchat-api (right diagonal) -->
  <line x1="400" y1="56" x2="510" y2="82" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- :duckchat-impl -->
  <rect x="60" y="85" width="245" height="68" rx="8" fill="#FDF4FF" stroke="#E9D5FF" stroke-width="1.5"/>
  <text x="183" y="103" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="12" font-weight="600" fill="#6B21A8">:duckchat-impl</text>
  <text x="183" y="117" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="10" fill="#7E22CE">NativeInputModeWidget</text>
  <text x="183" y="130" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="10" font-weight="600" fill="#B91C1C">VoiceButton (hardcoded)</text>
  <text x="183" y="143" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="10" fill="#7E22CE">NativeInputManager</text>

  <!-- :duckchat-api -->
  <rect x="430" y="85" width="240" height="68" rx="8" fill="#FDF4FF" stroke="#E9D5FF" stroke-width="1.5"/>
  <text x="550" y="103" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="12" font-weight="600" fill="#6B21A8">:duckchat-api</text>
  <text x="550" y="117" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="10" fill="#7E22CE">DuckAiFeatureState</text>
  <text x="550" y="130" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="10" fill="#7E22CE">NativeInputWidget (interface)</text>
  <text x="550" y="143" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="10" fill="#7E22CE">NativeInputManager (interface)</text>

  <!-- :duckchat-impl → :duckchat-api -->
  <line x1="305" y1="119" x2="428" y2="119" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- duckchat-impl deps bus (red = growing problem) -->
  <line x1="183" y1="153" x2="183" y2="170" stroke="#F87171" stroke-width="1.5"/>
  <line x1="70" y1="170" x2="340" y2="170" stroke="#F87171" stroke-width="1.5"/>
  <line x1="90"  y1="170" x2="90"  y2="182" stroke="#F87171" stroke-width="1.5" marker-end="url(#arrowR)"/>
  <line x1="200" y1="170" x2="200" y2="182" stroke="#F87171" stroke-width="1.5" marker-end="url(#arrowR)"/>
  <line x1="318" y1="170" x2="318" y2="182" stroke="#F87171" stroke-width="1.5" marker-end="url(#arrowR)"/>

  <rect x="22"  y="184" width="136" height="20" rx="8" fill="#FFF7ED" stroke="#FED7AA" stroke-width="1.5"/>
  <text x="90"  y="198" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="9" fill="#9A3412">:voice-search-api</text>
  <rect x="140" y="184" width="120" height="20" rx="8" fill="#FFF7ED" stroke="#FED7AA" stroke-width="1.5"/>
  <text x="200" y="198" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="9" fill="#9A3412">:subscriptions-api</text>
  <rect x="268" y="184" width="100" height="20" rx="8" fill="#FFF7ED" stroke="#FED7AA" stroke-width="1.5"/>
  <text x="318" y="198" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="9" fill="#9A3412">:browser-api</text>

  <!-- Warning note -->
  <rect x="430" y="168" width="298" height="46" rx="8" fill="#FEF2F2" stroke="#FCA5A5" stroke-width="1.5"/>
  <text x="579" y="184" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="11" font-weight="700" fill="#991B1B">⚠  Growing coupling</text>
  <text x="579" y="198" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="10" fill="#B91C1C">Every new button = code changes in duckchat-impl</text>
  <text x="579" y="210" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="10" fill="#B91C1C">+ a new dependency in its build.gradle</text>

  <!-- ══════════════════════════════════════
       AFTER
  ══════════════════════════════════════ -->
  <rect x="0" y="278" width="740" height="298" rx="12" fill="#F0FDF4" stroke="#BBF7D0" stroke-width="1.5"/>
  <rect x="8" y="286" width="62" height="20" rx="10" fill="#14532D"/>
  <text x="39" y="300" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="11" font-weight="700" fill="white">AFTER</text>

  <!-- :app (top-center) -->
  <rect x="300" y="296" width="140" height="26" rx="8" fill="#EEF2FF" stroke="#C7D2FE" stroke-width="1.5"/>
  <text x="370" y="313" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="12" font-weight="600" fill="#3730A3">:app</text>

  <!-- :app → :duckchat-impl (left) -->
  <line x1="330" y1="322" x2="168" y2="358" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- :app → :[feature]-impl (right) -->
  <line x1="410" y1="322" x2="570" y2="358" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- :duckchat-impl (left) -->
  <rect x="10" y="360" width="300" height="72" rx="8" fill="#FDF4FF" stroke="#E9D5FF" stroke-width="1.5"/>
  <text x="160" y="378" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="12" font-weight="600" fill="#6B21A8">:duckchat-impl</text>
  <text x="160" y="392" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="10" fill="#7E22CE">NativeInputModeWidget · NativeInputPluginPoint</text>
  <text x="160" y="405" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="10" fill="#7E22CE">VoiceNativeInputPlugin (@ContributesActivePlugin)</text>
  <text x="160" y="418" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="9" fill="#A855F7">initially here; can move to voice-search-impl later</text>

  <!-- :[feature]-impl (right, dashed) -->
  <rect x="420" y="360" width="310" height="62" rx="8" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="575" y="378" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="12" font-weight="600" fill="#475569">:[feature]-impl</text>
  <text x="575" y="392" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="10" fill="#64748B">any future plugin module</text>
  <text x="575" y="406" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="10" fill="#64748B">@ContributesActivePlugin</text>
  <text x="575" y="419" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="9" fill="#94A3B8">depends on :duckchat-api only — no :duckchat-impl</text>

  <!-- Converging arrows to :duckchat-api -->
  <!-- duckchat-impl → duckchat-api -->
  <line x1="160" y1="432" x2="260" y2="458" stroke="#34D399" stroke-width="1.5" marker-end="url(#arrowG)"/>
  <text x="176" y="450" font-family="-apple-system,sans-serif" font-size="9" fill="#059669">implements</text>
  <!-- :[feature]-impl → duckchat-api -->
  <line x1="575" y1="422" x2="480" y2="458" stroke="#34D399" stroke-width="1.5" marker-end="url(#arrowG)"/>
  <text x="490" y="446" font-family="-apple-system,sans-serif" font-size="9" fill="#059669">implements</text>

  <!-- :duckchat-api (center bottom, prominent) -->
  <rect x="180" y="460" width="380" height="78" rx="8" fill="#DCFCE7" stroke="#6EE7B7" stroke-width="2"/>
  <text x="370" y="478" text-anchor="middle" font-family="'SF Mono','Fira Code',monospace" font-size="12" font-weight="700" fill="#065F46">:duckchat-api</text>
  <text x="370" y="492" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="10" fill="#047857">DuckAiFeatureState · NativeInputWidget (i/f)</text>
  <line x1="220" y1="498" x2="520" y2="498" stroke="#A7F3D0" stroke-width="1"/>
  <text x="370" y="510" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="10" font-weight="600" fill="#059669">NativeInputPlugin (interface)  ←  NEW</text>
  <text x="370" y="523" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="10" font-weight="600" fill="#059669">PromptContribution · Container IDs (ids.xml)  ←  NEW</text>
  <text x="370" y="534" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="9" fill="#6EE7B7">stable contract — no further changes needed here</text>

  <!-- Benefit bar -->
  <rect x="0" y="550" width="740" height="26" rx="0" fill="#DCFCE7"/>
  <rect x="0" y="550" width="740" height="26" rx="12" fill="#DCFCE7"/>
  <text x="370" y="567" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="11" font-weight="600" fill="#14532D">✓  duckchat-impl never needs updating for new buttons — Anvil wires plugins at compile time</text>

</svg>

</html>
