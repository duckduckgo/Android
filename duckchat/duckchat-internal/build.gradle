plugins {
    id 'com.android.library'
    id 'kotlin-android'
    id 'com.squareup.anvil'
}

apply from: "$rootProject.projectDir/gradle/android-library.gradle"

android {
    anvil {
        generateDaggerFactories = true // default is false
    }
    lintOptions {
        baseline file("lint-baseline.xml")
        abortOnError = !project.hasProperty("abortOnError") || project.property("abortOnError") != "false"
    }
    namespace 'com.duckduckgo.duckchat.internal'
}

dependencies {
    anvil project(path: ':anvil-compiler')
    implementation project(path: ':anvil-annotations')
    implementation project(path: ':duck-ai-internal-api')
    implementation project(path: ':internal-features-api')
    implementation project(path: ':duckchat-api')
    implementation project(path: ':duckchat-impl')
    implementation project(path: ':content-scope-scripts-api')
    implementation project(path: ':content-scope-scripts-impl')
    implementation project(path: ':di')
    implementation project(path: ':common-utils')
    implementation project(path: ':data-store-api')
    implementation project(path: ':design-system')

    implementation KotlinX.coroutines.android
    implementation AndroidX.core.ktx
    implementation AndroidX.appCompat
    implementation AndroidX.lifecycle.viewModelKtx
    implementation AndroidX.lifecycle.runtime.ktx
    implementation Google.android.material
    implementation Google.dagger

    testImplementation Testing.junit4
    testImplementation Testing.robolectric
    testImplementation "org.mockito.kotlin:mockito-kotlin:_"
    testImplementation "androidx.test.ext:junit-ktx:_"
    testImplementation project(path: ':common-test')
    testImplementation project(path: ':data-store-test')
    testImplementation(KotlinX.coroutines.test) {
        exclude group: "org.jetbrains.kotlinx", module: "kotlinx-coroutines-debug"
    }
}
