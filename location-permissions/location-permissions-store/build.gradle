plugins {
    id 'com.android.library'
    id 'kotlin-android'
    id 'com.squareup.anvil'
    id 'com.google.devtools.ksp'
    id 'androidx.room'
}

apply from: "$rootProject.projectDir/gradle/android-library.gradle"

android {
    sourceSets {
        androidTest.assets.srcDirs += files("$projectDir/schemas")
    }
    room {
        schemaDirectory("$projectDir/schemas")
    }
    namespace 'com.duckduckgo.location.permissions.store'
    anvil {
        generateDaggerFactories = true // default is false
    }
    compileOptions {
        coreLibraryDesugaringEnabled = true
    }
}

dependencies {
    implementation project(path: ':location-permissions-api')
    implementation project(path: ':common-utils')
    implementation project(path: ':di')

    implementation project(path: ':anvil-annotations')

    implementation AndroidX.room.runtime
    ksp AndroidX.room.compiler
    implementation Google.dagger

    // DAO query return types (LiveData + Flow) — Room KSP needs these to resolve the DAO.
    implementation AndroidX.lifecycle.liveDataKtx
    implementation KotlinX.coroutines.core

    testImplementation project(path: ':common-test')
    testImplementation Testing.junit4

    coreLibraryDesugaring Android.tools.desugarJdkLibs
}
