name: CI Checks

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - develop
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check_changes:
    name: Check Changed Files
    runs-on: ubuntu-24.04
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check if checks should run
        id: check
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "Triggered manually — running checks"; echo "should_run=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          if [[ "${{ github.event_name }}" == "push" ]]; then
            echo "Direct push to branch — running checks"; echo "should_run=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"
          if ! CHANGED=$(git diff --name-only "$BASE" "$HEAD"); then
            echo "git diff failed — running checks as fallback"
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "Changed files:"; echo "$CHANGED"
          if ([ -n "$CHANGED" ] && echo "$CHANGED" | grep -qvE '(\.md$|^\.github/)') || \
             echo "$CHANGED" | grep -qF '.github/workflows/ci.yml'; then
            echo "Code or required CI workflow changes detected — running checks"
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "Only docs or optional workflow changes detected — skipping checks"
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi

  code_formatting:
    name: Code Formatting
    needs: [check_changes]
    if: needs.check_changes.outputs.should_run == 'true'
    runs-on: ubuntu-24.04
    env:
      DEVELOCITY_ACCESS_KEY: ${{ secrets.DEVELOCITY_ACCESS_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # required due to setting Spotless ratchetFrom
          submodules: recursive

      - name: Set up JDK version
        uses: actions/setup-java@v4
        with:
          java-version-file: .github/.java-version
          distribution: 'adopt'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

      - name: Run Code Formatting Checks
        run: ./gradlew spotlessCheck

  unit_tests:
    name: Unit tests
    needs: [check_changes]
    if: needs.check_changes.outputs.should_run == 'true'
    runs-on: android-large-runner
    env:
      DEVELOCITY_ACCESS_KEY: ${{ secrets.DEVELOCITY_ACCESS_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK version
        uses: actions/setup-java@v4
        with:
          java-version-file: .github/.java-version
          distribution: 'adopt'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

      - name: JVM tests
        run: ./gradlew jvm_tests ${{ github.event_name != 'pull_request' && '-Dpts.enabled=false' || '' }}

      - name: Bundle the JVM checks report
        if: always()
        run: find . -type d -name 'reports' | zip -@ -r unit-tests-report.zip

      - name: Upload the JVM checks report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-tests-report
          path: unit-tests-report.zip

  lint:
    name: Lint
    needs: [check_changes]
    if: needs.check_changes.outputs.should_run == 'true'
    runs-on: android-large-runner
    env:
      DEVELOCITY_ACCESS_KEY: ${{ secrets.DEVELOCITY_ACCESS_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK version
        uses: actions/setup-java@v4
        with:
          java-version-file: .github/.java-version
          distribution: 'adopt'

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.18.3'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

      - name: Lint
        run: ./gradlew lint

      - name: Bundle the lint report
        if: always()
        run: find . -name lint-results\* | zip -@ -r lint-report.zip

      - name: Upload the JVM lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: lint-report.zip

  android_tests:
    needs: [check_changes]
    if: needs.check_changes.outputs.should_run == 'true'
    runs-on: android-large-runner
    name: Android CI tests
    env:
      DEVELOCITY_ACCESS_KEY: ${{ secrets.DEVELOCITY_ACCESS_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup jq
        uses: dcarbone/install-jq-action@v1.0.1
        with:
          force: true

      - name: Set up JDK version
        uses: actions/setup-java@v4
        with:
          java-version-file: .github/.java-version
          distribution: 'adopt'

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.18.3'

      - name: Decode secret
        env:
          FLANK: ${{ secrets.FLANK }}
        run: echo "$FLANK" > flank.json

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

      - name: Build
        run: ./gradlew androidTestsBuild

      - name: Find test APK path
        id: find-apk
        run: |
          TEST_APK_PATH=$(find . -path '*/build/outputs/apk/play/debug/*.apk' -type f -print -quit)
          echo "Found test APK at: $TEST_APK_PATH"
          echo "apk_path=$TEST_APK_PATH" >> "$GITHUB_OUTPUT"

      - name: Make script executable
        run: chmod +x scripts/check_elf_alignment.sh

      - name: Check native libraries alignment
        id: check-alignment
        continue-on-error: true
        run: ./scripts/check_elf_alignment.sh ${{ steps.find-apk.outputs.apk_path }}

      - name: Handle native alignment failure
        if: steps.check-alignment.outcome == 'failure'
        run: |
          echo "::error::Native library alignment check failed!"
          echo "::error::Please check the native libraries in your APK for correct page size alignment."
          exit 1

      - name: Run Android Tests
        if: steps.check-alignment.outcome == 'success'
        run: ./gradlew runFlankAndroidTests --no-configuration-cache

      - name: Bundle the Android CI tests report
        if: |
          always() &&
          steps.check-alignment.outcome == 'success'
        run: find . -type d -name 'fladleResults' | zip -@ -r android-tests-report.zip

      - name: Generate json file with failures
        if: |
          failure() &&
          steps.check-alignment.outcome == 'success'
        run: cut -d\`  -f2 < build/fladle/fladleResults/HtmlErrorReport.html >> results.json

      - name: Print failure report
        if: |
          failure() &&
          steps.check-alignment.outcome == 'success'
        run: |
          jq -r '.[] | .label as $id | .items[] | "Test:", $id, "Failure:", .label, "URL:", .url, "\n"' results.json

      - name: Upload the Android CI tests report
        if: |
          always() &&
          steps.check-alignment.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: android-tests-report
          path: android-tests-report.zip
