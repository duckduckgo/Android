name: Build debug apk

on:
  pull_request:
    branches:
      - develop
    paths-ignore:
      - '**.md'
      - '.github/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_debug_apk:
    name: Build debug apk (${{ matrix.di }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        di: [AnvilDagger, Metro]
    env:
      DEVELOCITY_ACCESS_KEY: ${{ secrets.DEVELOCITY_ACCESS_KEY }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Create folder
        run: mkdir apk

      - name: Decode debug keys
        uses: davidSchuppa/base64Secret-toFile-action@v2
        with:
          secret: ${{ secrets.DEBUG_PROPERTIES }}
          fileName: ddg_android_debug_build.properties
          destination-path: $HOME/jenkins_static/com.duckduckgo.mobile.android/

      - name: Decode debug key file
        uses: davidSchuppa/base64Secret-toFile-action@v2
        with:
          secret: ${{ secrets.DEBUG_KEY }}
          fileName: android
          destination-path: $HOME/jenkins_static/com.duckduckgo.mobile.android/

      - name: Set up JDK version
        uses: actions/setup-java@v4
        with:
          java-version-file: .github/.java-version
          distribution: 'adopt'

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.18.3'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          cache-disabled: true # Develocity Artifact Cache supersedes setup-gradle's Gradle Home caching
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

      - name: Capture runner info for build scans
        uses: ./.github/actions/develocity-runner-info
        # Runner VM size, CPU count and region are auto-detected at runtime; no need to
        # hardcode a type. Pass runner-type only if you want an extra human-readable label.

      - name: Restore Develocity Setup + Artifact Cache
        uses: ./.github/actions/develocity-artifact-cache
        with:
          command: restore
          image-name: android-debug-apk-${{ matrix.di }}-v5 # restore + store must use the same image name
          develocity-access-key: ${{ secrets.DEVELOCITY_ACCESS_KEY }}
          repo-password: ${{ secrets.DAXMOBILE_ANDROID_CACHE_TOOLS }}

      - name: Assemble the project
        env:
          MALICIOUS_SITE_PROTECTION_AUTH_TOKEN: ${{ secrets.MALICIOUS_SITE_PROTECTION_AUTH_TOKEN }}
          DUCKSANS_PACKAGE_AUTH_USER: ${{ secrets.DAXMOBILE_GITHUB_PACKAGES_AUTOMATION_USER }}
          DUCKSANS_PACKAGE_AUTH_TOKEN: ${{ secrets.DAXMOBILE_GITHUB_PACKAGES_AUTOMATION }}
        run: ./gradlew assembleInternalDebug -Pforce-default-variant -Pddg.di=${{ matrix.di }}

      - name: Store Develocity Setup + Artifact Cache
        if: always()
        uses: ./.github/actions/develocity-artifact-cache
        with:
          command: store
          image-name: android-debug-apk-${{ matrix.di }}-v5 # restore + store must use the same image name
          develocity-access-key: ${{ secrets.DEVELOCITY_ACCESS_KEY }}
          repo-password: ${{ secrets.DAXMOBILE_ANDROID_CACHE_TOOLS }}

      - name: Obtain debug apk
        if: always()
        run: cp "$(find . -regex '.*outputs/apk/.*internal-debug.apk')" pr-ddg-debug-${{ matrix.di }}.apk

      - name: Upload debug apk
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-ddg-debug-${{ matrix.di }}
          path: pr-ddg-debug-${{ matrix.di }}.apk

      - name: Cleanup secrets
        if: always()
        run: rm -rf "$HOME/jenkins_static/com.duckduckgo.mobile.android/"*.properties "$HOME/jenkins_static/com.duckduckgo.mobile.android/android"
