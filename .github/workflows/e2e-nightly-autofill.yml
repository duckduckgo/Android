name: Autofill Feature Critical Path End-to-End tests

on:
  schedule:
    - cron: '30 6 * * *' # run at 6.30 AM UTC
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  instrumentation_tests:
    runs-on: ubuntu-latest
    name: Autofill Critical Path End-to-End Tests

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK version
        uses: actions/setup-java@v4
        with:
          java-version-file: .github/.java-version
          distribution: 'adopt'

      - name: Autofill Critical Path E2E Flows
        id: autofill-tests
        uses: mobile-dev-inc/action-maestro-cloud@v1.9.8
        timeout-minutes: 120
        with:
          api-key: ${{ secrets.ROBIN_API_KEY }}
          project-id: ${{ vars.ROBIN_ANDROID_PROJECT_ID }}
          name: autofill_${{ github.sha }}
          timeout: 100
          app-binary-id: c5598e22b2a8dccb31def3c26063f605b433913b
          android-api-level: 30
          workspace: .maestro
          include-tags: autofillNoAuthTests

      - name: Access Outputs
        if: always()
        run: |
          echo "Console URL: ${{ steps.autofill-tests.outputs.MAESTRO_CLOUD_CONSOLE_URL }}"
          echo "Flow Results: ${{ steps.autofill-tests.outputs.MAESTRO_CLOUD_FLOW_RESULTS }}"
          echo "Upload Status: ${{ steps.autofill-tests.outputs.MAESTRO_CLOUD_UPLOAD_STATUS }}"
          echo "App Binary ID: ${{ steps.autofill-tests.outputs.MAESTRO_CLOUD_APP_BINARY_ID }}"

     
