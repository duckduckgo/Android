name: Render NativeInput architecture diagrams

on:
  push:
    branches: [develop]
    paths:
      - 'docs/architecture/native-input/*.html'
  workflow_dispatch:

jobs:
  render-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GT_DAXMOBILE }}
          fetch-depth: 1

      - name: Install ffmpeg
        run: sudo apt-get install -y --no-install-recommends ffmpeg

      - name: Render diagrams
        run: |
          set -euo pipefail
          DIAGRAM_DIR="docs/architecture/native-input"

          for html_file in "$DIAGRAM_DIR"/*.html; do
            name=$(basename "$html_file" .html)

            # Read SVG viewport dimensions from the first <svg> tag
            svg_line=$(grep -m1 '<svg ' "$html_file")
            width=$(echo "$svg_line"  | grep -oP 'width="\K[0-9]+')
            height=$(echo "$svg_line" | grep -oP 'height="\K[0-9]+')

            if [[ -z "$width" || -z "$height" ]]; then
              echo "⚠  Could not parse dimensions for $name — skipping"
              continue
            fi

            # Viewport = SVG size + 40px body padding on each side
            vw=$((width  + 80))
            vh=$((height + 80))

            echo "→ Rendering $name (SVG ${width}×${height}, viewport ${vw}×${vh})"

            google-chrome-stable --headless --disable-gpu --no-sandbox \
              --screenshot="/tmp/raw_${name}.png" \
              --window-size="${vw},${vh}" \
              "file://${GITHUB_WORKSPACE}/${html_file}" 2>/dev/null

            # Crop: full width, SVG height only, skip top padding (y=40)
            ffmpeg -y -i "/tmp/raw_${name}.png" \
              -vf "crop=${vw}:${height}:0:40" \
              -update 1 "${DIAGRAM_DIR}/${name}.png" \
              -loglevel error

            echo "   ✓ ${DIAGRAM_DIR}/${name}.png"
          done

      - name: Commit rendered PNGs
        id: commit
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add docs/architecture/native-input/*.png

          if git diff --staged --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No PNG changes to commit"
          else
            git commit -m "Update NativeInput architecture diagrams [skip ci]"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          fi

      - name: Sync Asana task
        if: steps.commit.outputs.changed == 'true'
        env:
          ASANA_TOKEN: ${{ secrets.ASANA_ACCESS_TOKEN }}
          TASK_GID: "1214251791869701"
          REPO: ${{ github.repository }}
          SHA: ${{ steps.commit.outputs.sha }}
        run: |
          set -euo pipefail
          DIAGRAM_DIR="docs/architecture/native-input"
          RAW_BASE="https://raw.githubusercontent.com/${REPO}/develop/${DIAGRAM_DIR}"
          DATE=$(date -u '+%Y-%m-%d')

          # ── 1. Delete existing PNG attachments ─────────────────────────────
          echo "Fetching existing attachments…"
          existing=$(curl -sf \
            "https://app.asana.com/api/1.0/tasks/${TASK_GID}/attachments?opt_fields=gid,name" \
            -H "Authorization: Bearer $ASANA_TOKEN")

          echo "$existing" | python3 - <<'PYEOF'
          import sys, json, os, subprocess
          data = json.loads(sys.stdin.read())["data"]
          token = os.environ["ASANA_TOKEN"]
          task  = os.environ["TASK_GID"]
          deleted = 0
          for a in data:
              if a.get("name", "").endswith(".png"):
                  r = subprocess.run(
                      ["curl", "-sf", "-X", "DELETE",
                       f"https://app.asana.com/api/1.0/attachments/{a['gid']}",
                       "-H", f"Authorization: Bearer {token}"],
                      capture_output=True)
                  if r.returncode == 0:
                      print(f"  Deleted {a['name']} ({a['gid']})")
                      deleted += 1
          print(f"Removed {deleted} old diagram attachment(s)")
          PYEOF

          # ── 2. Upload new PNGs ─────────────────────────────────────────────
          echo "Uploading new diagrams…"
          for png in "$DIAGRAM_DIR"/*.png; do
            label=$(basename "$png")
            curl -sf -X POST "https://app.asana.com/api/1.0/attachments" \
              -H "Authorization: Bearer $ASANA_TOKEN" \
              -F "parent=${TASK_GID}" \
              -F "file=@${png};type=image/png" \
              -F "name=${label}" > /dev/null
            echo "  ✓ $label"
          done

          # ── 3. Update task html_notes ──────────────────────────────────────
          # Diagram labels and file stems in display order
          declare -A LABELS=(
            ["00-module-dependencies"]="Module Dependencies (before/after refactor)"
            ["01-native-input-dataflow"]="Widget Data Flow"
            ["02-plugin-dataflow"]="Plugin System (setup · tap · send)"
            ["03-current-module-deps"]="Current Module Graph (develop)"
            ["04-state-management"]="State Management (ViewModel → Widget)"
          )

          diagram_links=""
          for stem in 00-module-dependencies 01-native-input-dataflow 02-plugin-dataflow 03-current-module-deps 04-state-management; do
            label="${LABELS[$stem]}"
            url="${RAW_BASE}/${stem}.png"
            diagram_links+="<li><a href=\"${url}\">${label}</a></li>"
          done

          # Read the current task notes to preserve any existing content
          current_notes=$(curl -sf \
            "https://app.asana.com/api/1.0/tasks/${TASK_GID}?opt_fields=html_notes" \
            -H "Authorization: Bearer $ASANA_TOKEN" | \
            python3 -c "import sys,json; print(json.load(sys.stdin)['data'].get('html_notes',''))")

          # Build the updated notes: replace the diagram section if it exists,
          # otherwise append it. We delimit our section with a known marker comment.
          OPEN_MARKER="<!-- diagrams-section -->"
          CLOSE_MARKER="<!-- /diagrams-section -->"

          diagram_section="${OPEN_MARKER}<h2>Architecture Diagrams</h2><p>Last rendered: ${DATE} · commit <code>${SHA}</code> · see attachments below for full-resolution images.</p><ul>${diagram_links}</ul>${CLOSE_MARKER}"

          # Use Python to splice/append the section
          updated_notes=$(python3 <<PYEOF2
          import re, sys

          current = """${current_notes}"""
          section = """${diagram_section}"""
          open_m  = "<!-- diagrams-section -->"
          close_m = "<!-- /diagrams-section -->"

          if open_m in current and close_m in current:
              # Replace existing section
              pattern = re.escape(open_m) + ".*?" + re.escape(close_m)
              result = re.sub(pattern, section, current, flags=re.DOTALL)
          elif current.strip():
              # Append to existing non-empty notes
              result = current.rstrip("</body>").rstrip() + section + "</body>"
          else:
              result = "<body>" + section + "</body>"

          print(result)
          PYEOF2
          )

          payload=$(python3 -c "
          import json, sys
          notes = sys.stdin.read()
          print(json.dumps({'data': {'html_notes': notes}}))
          " <<< "$updated_notes")

          curl -sf -X PUT \
            "https://app.asana.com/api/1.0/tasks/${TASK_GID}" \
            -H "Authorization: Bearer $ASANA_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$payload" > /dev/null

          echo "✓ Asana task updated"

          # ── 4. Post summary comment ────────────────────────────────────────
          curl -sf -X POST \
            "https://app.asana.com/api/1.0/tasks/${TASK_GID}/stories" \
            -H "Authorization: Bearer $ASANA_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"data\": {\"text\": \"📐 Architecture diagrams re-rendered (${DATE}, commit ${SHA}). Attachments and description updated.\"}}" \
            > /dev/null

          echo "✓ Posted Asana comment"
