name: Perf Benchmark - Nightly

on:
  # TEMPORARY (remove before PR): smoke-test the workflow on this branch. A push run does NOT
  # report the pixel (that's gated on event_name == 'schedule') and checks out this branch's code.
  push:
    branches: [feature/ana/macrobenchmark_poc]
  schedule:
    - cron: '0 3 * * *'   # 3 AM UTC, after build-benchmark (2 AM)
  workflow_dispatch:

jobs:
  page-load-benchmark:
    name: Page-load benchmark
    # Matches the Flank/androidTests job in nightly.yml — the :app build is too heavy for a stock runner.
    runs-on: android-large-runner
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'schedule' && 'develop' || github.ref_name }}
          submodules: recursive

      - uses: actions/setup-java@v4
        with:
          distribution: 'adopt'
          java-version-file: .github/.java-version

      - uses: gradle/actions/setup-gradle@v5
        with:
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}
          cache-read-only: true

      - name: Write Flank credentials
        env:
          FLANK: ${{ secrets.FLANK }}
        run: echo "$FLANK" > flank.json

      # With -PmacrobenchLocalSigning, internalRelease is signed with the local debug keystore so FTL
      # can install the (non-debuggable) app under test (see app/build.gradle macrobenchDebug + the
      # macrobenchmark module's debugKey). A release build won't auto-create the debug keystore, so
      # ensure it exists (matches AGP's default debug key).
      - name: Ensure debug keystore exists
        run: |
          if [ ! -f "$HOME/.android/debug.keystore" ]; then
            mkdir -p "$HOME/.android"
            keytool -genkeypair -v \
              -keystore "$HOME/.android/debug.keystore" \
              -storepass android -alias androiddebugkey -keypass android \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -dname "CN=Android Debug,O=Android,C=US"
          fi

      # Real DuckSans font (not placeholder stubs) so page-load rendering timings are representative.
      # Same GitHub Packages credentials the release/e2e jobs use.
      - name: Build APKs
        env:
          DUCKSANS_PACKAGE_AUTH_USER: ${{ secrets.DAXMOBILE_GITHUB_PACKAGES_AUTOMATION_USER }}
          DUCKSANS_PACKAGE_AUTH_TOKEN: ${{ secrets.DAXMOBILE_GITHUB_PACKAGES_AUTOMATION }}
        run: ./gradlew :app:assembleInternalRelease :macrobenchmark:assembleRelease -PmacrobenchLocalSigning

      - name: Run page-load benchmark on FTL
        run: ./gradlew runFlankPerfTests --no-configuration-cache

      # Flank uploads the directories-to-pull output (the macrobench trace + benchmarkData.json) to
      # its GCS results bucket but does NOT download it to the runner — only test-result XMLs land in
      # build/fladle/perfResults. Authenticate with the same FTL service account and pull the two
      # files from the bucket path Flank recorded in matrix_ids.json.
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FLANK }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Download benchmark artifacts from the FTL results bucket
        run: |
          set -euo pipefail
          GCS_PATH=$(jq -r '.[].gcsPath' build/fladle/perfResults/matrix_ids.json | head -1)
          GCS_PATH="${GCS_PATH%/}"   # gcsPath ends with '/'; strip it to avoid a '//' in the URL
          if [ -z "$GCS_PATH" ] || [ "$GCS_PATH" = "null" ]; then
            echo "ERROR: could not read gcsPath from matrix_ids.json:" >&2
            cat build/fladle/perfResults/matrix_ids.json >&2
            exit 1
          fi
          echo "FTL results bucket path: gs://${GCS_PATH}"
          # Recursively download the whole matrix results dir (no server-side globbing to depend on);
          # post-processing then finds the trace + benchmarkData.json under it.
          mkdir -p pageload-artifacts
          gcloud storage cp -r "gs://${GCS_PATH}/*" pageload-artifacts/
          echo "=== downloaded ==="; find pageload-artifacts -type f | sort

      - name: Install Perfetto trace_processor
        run: |
          curl -LO https://get.perfetto.dev/trace_processor
          chmod +x trace_processor
          sudo mv trace_processor /usr/local/bin/trace_processor_shell

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r perf-benchmarks/requirements.txt

      - name: Post-process trace and report
        run: |
          set -euo pipefail
          # Inputs were downloaded from the FTL bucket into pageload-artifacts/ by the previous step.
          # Exactly one device/model is configured (fladle perfTests), so we expect exactly one trace
          # + one benchmarkData.json — fail loudly on 0 (nothing downloaded) or >1 (matrix grew and
          # this single-trace assumption no longer holds) rather than pick one arbitrarily.
          require_one() {
            local label="$1"; shift
            local matches; matches=$(find pageload-artifacts -name "$1" | sort)
            local n; n=$(printf '%s' "$matches" | grep -c . || true)
            if [ "$n" -ne 1 ]; then
              echo "ERROR: expected exactly 1 $label, found $n:" >&2
              printf '%s\n' "$matches" >&2
              exit 1
            fi
            printf '%s' "$matches"
          }
          TRACE=$(require_one "perfetto trace" '*.perfetto-trace')
          DATA=$(require_one "benchmarkData.json" '*-benchmarkData.json')
          python3 perf-benchmarks/pageload_benchmark.py \
            --trace "$TRACE" --benchmark-data "$DATA" \
            --github-action-run-id "${{ github.run_id }}" \
            --git-commit-sha "${{ github.sha }}" \
            ${{ github.event_name == 'schedule' && '--report-pixel' || '' }}

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pageload-benchmark-${{ github.run_number }}
          path: |
            pageload-results.json
            pageload-artifacts/**
          retention-days: 30
