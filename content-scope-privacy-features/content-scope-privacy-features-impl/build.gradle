plugins {
    id 'com.android.library'
    id 'kotlin-android'
    id 'com.squareup.anvil'
    id 'com.google.devtools.ksp'
}

apply from: "$rootProject.projectDir/gradle/android-library.gradle"

dependencies {
    implementation project(':content-scope-privacy-features-api')
    ksp project(':content-scope-privacy-features-ksp')

    implementation project(':di')
    implementation project(':common-utils')
    implementation project(':privacy-config-api')
    implementation project(':content-scope-scripts-api')
    implementation project(':data-store-api')

    implementation Google.dagger
    implementation KotlinX.coroutines.core
}

android {
    anvil {
        generateDaggerFactories = true
    }
    namespace 'com.duckduckgo.contentscopeprivacyfeatures.impl'
}
