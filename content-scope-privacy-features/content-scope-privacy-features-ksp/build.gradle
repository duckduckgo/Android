plugins {
    id 'java-library'
    id 'kotlin'
}

apply from: "$rootProject.projectDir/code-formatting.gradle"

java {
    sourceCompatibility = JavaVersion.VERSION_17
    targetCompatibility = JavaVersion.VERSION_17
}

kotlin {
    jvmToolchain(17)
}

dependencies {
    implementation project(':content-scope-privacy-features-api')
    implementation "com.google.devtools.ksp:symbol-processing-api:1.9.24-1.0.20"
}
