plugins {
    id 'java-library'
    id 'kotlin'
}

apply from: "$rootProject.projectDir/code-formatting.gradle"

java {
    sourceCompatibility = JavaVersion.VERSION_17
    targetCompatibility = JavaVersion.VERSION_17
}

kotlin {
    jvmToolchain(21)
}

dependencies {
    implementation project(':content-scope-privacy-features-api')
    implementation "com.google.devtools.ksp:symbol-processing-api:_"
}
