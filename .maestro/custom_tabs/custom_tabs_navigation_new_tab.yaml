appId: com.duckduckgo.mobile.android
androidWebViewHierarchy: devtools
name: "Custom Tabs navigation in new tab"
tags:
  - customTabsTest
---
- retry:
    maxRetries: 3
    commands:
      - launchApp:
          clearState: true
          stopApp: true
          arguments:
            isMaestro: "true"
            webContentDebugging: "true"

      - runFlow:
          file: ../shared/pre_onboarding.yaml
          env:
            SET_AS_DEFAULT: "true"
      - runFlow: ../shared/browser_screen/click_on_menu_button.yaml
      - tapOn:
          text: "settings"
      - scrollUntilVisible:
          element:
            text: "developer settings"
          direction: DOWN
      - tapOn:
          text: "developer settings"
      - scrollUntilVisible:
          element:
            text: "custom tabs"
          direction: DOWN
      - tapOn:
          text: "custom tabs"
      - tapOn:
          text: "add your url here"
      - inputText: "https://www.search-company.site"
      - hideKeyboard
      - tapOn:
          text: "load custom tab"
      - tapOn:
          id: "com.duckduckgo.mobile.android:id/browserMenuImageView"
      - assertVisible:
          text: "running in duckduckgo"
      - action: back
      - tapOn:
          text: "[Ad 2] Shopping Tab Ad (heuristic)"
      - extendedWaitUntil:
          visible:
            text: "Publisher site"
          timeout: 5000
      - action: back
      - tapOn:
          text: "[Ad 2] Shopping Tab Ad (heuristic)"
      - extendedWaitUntil:
          visible:
            text: "Red shoes"
          timeout: 5000
      - tapOn:
          text: "Red shoes"
      - extendedWaitUntil:
          visible:
            text: "Checkout"
          timeout: 5000
      - tapOn:
          id: "com.duckduckgo.mobile.android:id/browserMenuImageView"
      - tapOn:
          id: "com.duckduckgo.mobile.android:id/backMenuItem"
      - extendedWaitUntil:
          visible:
            text: "Red shoes"
          timeout: 5000
      - tapOn:
          id: "com.duckduckgo.mobile.android:id/browserMenuImageView"
      - tapOn:
          id: "com.duckduckgo.mobile.android:id/forwardMenuItem"
      - extendedWaitUntil:
          visible:
            text: "Checkout"
          timeout: 5000
