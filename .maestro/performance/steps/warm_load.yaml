appId: com.duckduckgo.mobile.android
---
# Performs a single warm page load for the current website in the iteration.
# Relaunches without clearing state so the HTTP cache from the preceding cold
# load is retained.

- launchApp:
    stopApp: true

# Wait for the page reload to start before checking for completion.
# Without this, notVisible below would be true immediately at launch
# (before the indicator has had a chance to appear) and the app would stop
# before the page has loaded.
- extendedWaitUntil:
    visible:
      id: pageLoadingIndicator
    timeout: 10000
    optional: true

- extendedWaitUntil:
    notVisible:
      id: pageLoadingIndicator
    timeout: 30000
    optional: true

- stopApp
