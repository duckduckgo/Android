appId: com.duckduckgo.mobile.android
---
# Performs a single cold page load for the current website in the iteration.
# Wipes all app state (including HTTP cache) before launching.

- launchApp:
    clearState: true
    stopApp: true

- runFlow: ../../shared/skip_all_onboarding.yaml

- extendedWaitUntil:
    visible: "Search"
    timeout: 5000

- tapOn:
    id: "omnibarTextInput"

- inputText: "${output.websites.urls[output.websites.counter]}"
- pressKey: Enter

- extendedWaitUntil:
    notVisible:
      id: pageLoadingIndicator
    timeout: 30000
    optional: true

- stopApp
