appId: com.duckduckgo.mobile.android
---
- runScript: onboarding_scripts/setup.js

# Tap the Skip Onboarding debug button by id — the text-based selector is
# unreliable on the new onboarding because the status bar can clip the button.
- extendedWaitUntil:
    visible:
      id: "skipOnboardingButton"
    timeout: 10000
    optional: true

- runFlow:
    when:
      visible:
        id: "skipOnboardingButton"
    commands:
      - tapOn:
          id: "skipOnboardingButton"
      - runScript: onboarding_scripts/skipped_onboarding.js

- runFlow:
    when:
      true: ${output.onboarding.runFullOnboarding}
    commands:
      - runFlow: pre_onboarding.yaml


