appId: com.duckduckgo.mobile.android
---
- runFlow:
    when:
      notVisible:
        id: 'com.duckduckgo.mobile.android:id/fireIconImageView'
    commands:
      - runFlow:
          when:
            notVisible:
              id: 'com.duckduckgo.mobile.android:id/inputFieldFireIconImageview'
          commands:
            - hideKeyboard

- runFlow:
    when:
      visible:
        id: 'com.duckduckgo.mobile.android:id/fireIconImageView'
    commands:
      - tapOn:
          id: 'com.duckduckgo.mobile.android:id/fireIconImageView'

- runFlow:
    when:
      visible:
        id: 'com.duckduckgo.mobile.android:id/inputFieldFireIconImageview'
    commands:
      - tapOn:
          id: 'com.duckduckgo.mobile.android:id/inputFieldFireIconImageview'
