appId: com.duckduckgo.mobile.android
name: "Preonboarding: Ensuring user can resume onboarding with show tutorial"
tags:
  - preonboardingTest
---
# Pre-requisite: None

- retry:
    maxRetries: 3
    commands:
      - launchApp:
          clearState: true
- assertVisible:
    text: ".*Ready for a faster browser that protects you and lets you decide when and how to use AI?.*"
- assertVisible: "let's get started!"
- tapOn: "I've been here before"
- assertVisible:
    text: "Got it! I'll skip the other tips."
- assertVisible:
    text: ".*Remember: you can delete all your tabs, history, and browsing data in two taps with the Fire Button..*"
- assertVisible:
    text: "Start Browsing"
- tapOn: "Show Tutorial"
- assertVisible:
    text: "Protections activated!"
- assertVisible:
    text: "Choose Your Browser"
