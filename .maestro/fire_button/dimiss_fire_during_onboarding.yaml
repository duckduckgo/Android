appId: com.duckduckgo.mobile.android
androidWebViewHierarchy: devtools
name: "ReleaseTest: Fire button is dismissed"
tags:
  - releaseTest
---
- retry:
    maxRetries: 3
    commands:
      - launchApp:
          clearState: true
          stopApp: true

      - runFlow: ../shared/pre_onboarding.yaml

      # pre_onboarding ends on a search result page; type the test URL into the omnibar
      # (the native input field only exists on the new-tab page).
      - tapOn:
          id: "omnibarTextInput"
      - inputText: "https://privacy-test-pages.site"
      - pressKey: Enter
      - assertVisible:
          text: ".*keep.browsing.*"
      - tapOn:
          text: "got it"
      - assertVisible:
          text: ".*browsing activity with the fire button.*"
      - tapOn:
          id: "daxDialogDismissButton|contextualBrandDesignDismissButton"
      - assertNotVisible:
          text: ".*browsing activity with the Fire Button.*"