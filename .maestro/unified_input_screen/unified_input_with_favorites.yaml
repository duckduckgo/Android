appId: com.duckduckgo.mobile.android
name: "UnifiedInput: new tab shows pre-seeded favorites"
tags:
  - unifiedInputTest
---
- retry:
    maxRetries: 3
    commands:
      - launchApp:
          clearState: true
          stopApp: true
          arguments:
            # isMaestro is auto-injected by the Maestro runtime on every launchApp call
            testScenario: "favorites_3"
            nativeInputToggle: "true"
      - runFlow: ../shared/skip_all_onboarding.yaml
      - runFlow: ./shared/enable_unified_input.yaml
      - assertVisible:
          text: "Example"
      - assertVisible:
          text: "DuckDuckGo"
      - assertVisible:
          text: "Privacy Test Pages"
