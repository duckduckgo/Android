appId: com.duckduckgo.mobile.android.debug
name: "UnifiedInput: new tab shows pre-seeded favorites"
tags:
  - unifiedInputTest
---
- retry:
    maxRetries: 3
    commands:
      - launchApp:
          clearState: true
          stopApp: true
          arguments:
            isMaestro: "true"
            nativeInputToggle: "true"
            inputWithAiToggle: "true"
            omnibarPosition: "bottom"
            testScenario: "favorites_3"
      - runFlow: ../shared/skip_all_onboarding.yaml
      - assertVisible:
          text: "Example"
      - assertVisible:
          text: "DuckDuckGo"
      - assertVisible:
          text: "Privacy Test Pages"
