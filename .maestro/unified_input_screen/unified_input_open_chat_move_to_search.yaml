appId: com.duckduckgo.mobile.android.debug
name: "UnifiedInput: open new duck.ai chat and move back to search mode × AI combos"
tags:
  - unifiedInputTest
---
# 1/6 — AI on, omnibar top
- retry:
    commands:
      - launchApp:
          clearState: true
          stopApp: true
          arguments:
            isMaestro: "true"
            nativeInputToggle: "true"
            inputWithAiToggle: "true"
            omnibarPosition: "top"
            addFavorites: "example.com;duckduckgo.com;privacytest.com"
      - runFlow: shared/launch_and_skip_onboarding.yaml
      - runFlow: shared/open_new_chat.yaml

