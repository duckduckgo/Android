appId: com.duckduckgo.mobile.android.debug
name: "UnifiedInput: AI on, omnibar bottom, seeded favorites visible"
tags:
  - unifiedInputTest
---
- retry:
    maxRetries: 3
    commands:
      - launchApp:
          clearState: true
          stopApp: true
          arguments:
            isMaestro: "true"
            nativeInputToggle: "true"
            inputWithAiToggle: "true"
            omnibarPosition: "bottom"
            addFavorites: "3"
      - runFlow: ../shared/skip_all_onboarding.yaml
      - assertVisible:
          text: "Favorite 1"
      - assertVisible:
          text: "Favorite 2"
      - assertVisible:
          text: "Favorite 3"
