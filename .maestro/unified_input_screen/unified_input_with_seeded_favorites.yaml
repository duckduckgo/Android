appId: com.duckduckgo.mobile.android.debug
name: "UnifiedInput: seeded favorites visible across omnibar × AI combos"
tags:
  - unifiedInputTest
---
# 1/6 — AI on, omnibar top
- retry:
    commands:
      - launchApp:
          clearState: true
          stopApp: true
          arguments:
            isMaestro: "true"
            nativeInputToggle: "true"
            inputWithAiToggle: "true"
            omnibarPosition: "top"
            testScenario: "favorites_3"
      - runFlow: ../shared/skip_all_onboarding.yaml
      - runFlow: shared/assert_seeded_favorites_visible.yaml
      - runFlow: shared/open_new_chat.yaml

