appId: com.duckduckgo.mobile.android.debug
name: "UnifiedInput: search suggestions visible and dismiss × omnibar positions"
tags:
  - unifiedInputTest
---
# 1/3 — omnibar top
- retry:
    maxRetries: 3
    commands:
      - launchApp:
          clearState: true
          stopApp: true
          arguments:
            isMaestro: "true"
            nativeInputToggle: "true"
            inputWithAiToggle: "true"
            omnibarPosition: "top"
            addFavorites: "example.com;duckduckgo.com;privacytest.com"
      - runFlow: ../shared/skip_all_onboarding.yaml
      - runFlow: shared/flow_search_suggestions.yaml

# 2/3 — omnibar bottom
- retry:
    maxRetries: 3
    commands:
      - launchApp:
          clearState: true
          stopApp: true
          arguments:
            isMaestro: "true"
            nativeInputToggle: "true"
            inputWithAiToggle: "true"
            omnibarPosition: "bottom"
            addFavorites: "example.com;duckduckgo.com;privacytest.com"
      - runFlow: ../shared/skip_all_onboarding.yaml
      - runFlow: shared/flow_search_suggestions.yaml

# 3/3 — omnibar split
- retry:
    maxRetries: 3
    commands:
      - launchApp:
          clearState: true
          stopApp: true
          arguments:
            isMaestro: "true"
            nativeInputToggle: "true"
            inputWithAiToggle: "true"
            omnibarPosition: "split"
            addFavorites: "example.com;duckduckgo.com;privacytest.com"
      - runFlow: ../shared/skip_all_onboarding.yaml
      - runFlow: shared/flow_search_suggestions.yaml
