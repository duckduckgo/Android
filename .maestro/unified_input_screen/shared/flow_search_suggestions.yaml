appId: com.duckduckgo.mobile.android.debug
---
# unified input is open by default with nativeInputToggle="true";
# wait for it to settle after onboarding skip
- extendedWaitUntil:
    visible:
      id: "inputModeWidget"
    timeout: 15000
- assertVisible:
    id: "inputModeWidget"

# Search mode is the default — type a URL to one of our privacy test pages
# and assert the autocomplete picks it up. We use privacy-test-pages.site
# because it's DDG-controlled — sites like reddit.com block Maestro Cloud's
# datacenter IPs with a "blocked by network security" page.
- inputText: "privacy-test-pages.site"
- extendedWaitUntil:
    visible:
      id: "autoCompleteSuggestionsList"
    timeout: 10000
- assertVisible:
    text: "privacy-test-pages.site"
    childOf:
      id: "autoCompleteSuggestionsList"

# submit by tapping the suggestion (more stable on Maestro Cloud than pressKey
# Enter, which has crashed the app on CI runs) and assert the page loads + the
# unified input dismisses
- tapOn:
    text: "privacy-test-pages.site"
    childOf:
      id: "autoCompleteSuggestionsList"
- extendedWaitUntil:
    visible:
      id: "browserLayout"
    timeout: 20000
- assertVisible:
    id: "browserLayout"
- assertNotVisible:
    id: "inputModeWidget"
- assertVisible:
    text: ".*privacy-test-pages.site.*"
    childOf:
      id: "omnibarTextInput"
