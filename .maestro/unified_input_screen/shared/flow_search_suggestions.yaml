appId: com.duckduckgo.mobile.android
---
# unified input is open by default with nativeInputToggle="true";
# wait for it to settle after onboarding skip
- extendedWaitUntil:
    visible:
      id: "inputModeWidget"
    timeout: 15000
- assertVisible:
    id: "inputModeWidget"

# Search mode is the default — type a query and assert suggestions appear
- inputText: "reddit"
- extendedWaitUntil:
    visible:
      id: "autoCompleteSuggestionsList"
    timeout: 10000
- assertVisible:
    text: "reddit.com"
    childOf:
      id: "autoCompleteSuggestionsList"

# submit by tapping the suggestion (more stable on Maestro Cloud than pressKey
# Enter, which has crashed the app on CI runs) and assert the SERP loads
- tapOn:
    text: "reddit.com"
    childOf:
      id: "autoCompleteSuggestionsList"
- extendedWaitUntil:
    visible:
      id: "browserLayout"
    timeout: 20000
- assertVisible:
    id: "browserLayout"
- assertNotVisible:
    id: "inputModeWidget"
- assertVisible:
    text: "reddit"
    childOf:
      id: "browserLayout"
