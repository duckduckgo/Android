appId: com.duckduckgo.mobile.android
---
# Robust replacement for ../../shared/skip_all_onboarding.yaml — the upstream
# version falls back to ../../shared/pre_onboarding.yaml whose asserted welcome
# copy has drifted from the current onboarding, so it fails on the new build.
- extendedWaitUntil:
    visible:
      id: "skipOnboardingButton"
    timeout: 30000
- tapOn:
    id: "skipOnboardingButton"
- extendedWaitUntil:
    visible:
      id: "inputModeWidget"
    timeout: 30000
